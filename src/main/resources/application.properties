# MySQL ( User Data )
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mafiaGame}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1111}
spring.datasource.hikari.maximum-pool-size=30

## Redis ( Game Data )
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=0
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

game.timer.worker.poll-delay-ms=500
game.timer.worker.requeue-delay-ms=2000
game.timer.worker.batch-size=20
game.timer.worker.processing-lease-ms=15000


# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# 성능 테스트시 WARN으로 설정 (일반 개발시 DEBUG)
# 개발 시에는 DEBUG로 변경
logging.level.com.example.mafiagame=WARN
logging.level.com.example.mafiagame.game.service.RedisTimerService=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.messaging=WARN

server.port=8080

jwt.secret=${JWT_SECRET:dev-please-set-jwt-secret-to-at-least-64-bytes-long-string-for-dev-only}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:1800000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===== OAuth2 Settings =====
# Google (Client ID/Secret은 https://console.cloud.google.com 에서 발급)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# GitHub (Client ID/Secret은 https://github.com/settings/developers 에서 발급)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# Naver (Client ID/Secret은 https://developers.naver.com 에서 발급)
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# Kakao (Client ID/Secret은 https://developers.kakao.com 에서 발급)
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# ===== AI Configuration =====
gemini.api-key=${GEMINI_API_KEY:}
gemini.url=https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent

logging.file.path=./logs
logging.file.name=./logs/security-audit.log

