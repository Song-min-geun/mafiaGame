spring.application.name=mafiagame-test

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

logging.level.root=WARN
logging.level.com.example.mafiagame.global.concurrency=INFO
logging.level.org.springframework.web=WARN

jwt.secret=TestSecretKeyForConcurrencyTestingWhichIsAtLeast64BytesLong12345678
jwt.access-expiration=3600000
jwt.refresh-expiration=604800000

GOOGLE_CLIENT_ID=dummy
GOOGLE_CLIENT_SECRET=dummy
GITHUB_CLIENT_ID=dummy
GITHUB_CLIENT_SECRET=dummy
NAVER_CLIENT_ID=dummy
NAVER_CLIENT_SECRET=dummy
KAKAO_CLIENT_ID=dummy
KAKAO_CLIENT_SECRET=dummy

server.port=8081
