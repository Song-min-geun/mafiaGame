name: ci

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/mafiaGame?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: mafia
      DB_PASSWORD: mafia_pass
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET: dev-please-change-to-at-least-64-bytes-long-string
      GOOGLE_CLIENT_ID: dummy
      GOOGLE_CLIENT_SECRET: dummy
      GITHUB_CLIENT_ID: dummy
      GITHUB_CLIENT_SECRET: dummy
      NAVER_CLIENT_ID: dummy
      NAVER_CLIENT_SECRET: dummy
      KAKAO_CLIENT_ID: dummy
      KAKAO_CLIENT_SECRET: dummy

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: mafiaGame
          MYSQL_USER: mafia
          MYSQL_PASSWORD: mafia_pass
          MYSQL_ROOT_PASSWORD: mafia_root_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew test --no-daemon

      - name: Build Jar
        run: ./gradlew bootJar --no-daemon
