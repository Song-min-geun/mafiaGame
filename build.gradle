plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.4'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

sourceSets {
    failoverTest {
        java.srcDir file('src/failoverTest/java')
        resources.srcDir file('src/failoverTest/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
}

configurations {
    failoverTestImplementation.extendsFrom testImplementation
    failoverTestRuntimeOnly.extendsFrom testRuntimeOnly
}

repositories {
    mavenCentral()
}

// 프로젝트에 필요한 라이브러리(의존성)를 정의합니다.
dependencies {
    // Spring Boot 웹 스타터
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // Spring Boot 웹소켓 스타터
    implementation 'org.springframework.boot:spring-boot-starter-websocket'

    // for valid
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Spring Boot 개발 도구
    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    // Spring Boot 테스트
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.testcontainers:testcontainers'
    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.springframework.security:spring-security-test'

    //h2 (개발용)
    runtimeOnly 'com.h2database:h2'

    //MySQL
    runtimeOnly 'com.mysql:mysql-connector-j'

    //JPA
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

    //Spring Security
    implementation 'org.springframework.boot:spring-boot-starter-security'
    
    //OAuth2 Client (소셜 로그인)
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'

    //JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'

    //Redis
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'org.springframework.session:spring-session-data-redis'
	implementation 'org.springframework.boot:spring-boot-starter-cache'
    
    //Redisson (분산 락)
    implementation 'org.redisson:redisson-spring-boot-starter:3.27.0'
    
    //nGinder
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'io.micrometer:micrometer-registry-prometheus'

    //swagger
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.3.0'
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.20'

    // Spring Retry (Optimistic Lock 재시도용)
    implementation 'org.springframework.retry:spring-retry'
    implementation 'org.springframework:spring-aspects'

    // Kafka (이벤트 기반 비동기 처리)
    implementation 'org.springframework.kafka:spring-kafka'
    testImplementation 'org.springframework.kafka:spring-kafka-test'

    // Spring Batch (정산 배치)
    implementation 'org.springframework.boot:spring-boot-starter-batch'
    testImplementation 'org.springframework.batch:spring-batch-test'

    // WebClient (PG사 API 호출용)
    implementation 'org.springframework.boot:spring-boot-starter-webflux'

    // Testcontainers Kafka
    testImplementation 'org.testcontainers:kafka'
}

tasks.named('test') {
    useJUnitPlatform()
    minHeapSize = '256m'
    maxHeapSize = '1g'

    testLogging {
        showStandardStreams = true  // System.out.println 출력 허용
        events "passed", "skipped", "failed" // 테스트 통과/실패 여부도 로그에 찍힘
    }
}

tasks.register('failoverTest', Test) {
    description = 'Runs Redis Sentinel/failover focused tests separately from the default test suite.'
    group = 'verification'

    testClassesDirs = sourceSets.failoverTest.output.classesDirs
    classpath = sourceSets.failoverTest.runtimeClasspath
    shouldRunAfter tasks.named('test')

    useJUnitPlatform()
    minHeapSize = '512m'
    maxHeapSize = '2g'
    systemProperty 'spring.profiles.active', 'test,failover'

    if (project.hasProperty('enableZgc')) {
        jvmArgs '-XX:+UseZGC'
        if (JavaVersion.current().majorVersion.toInteger() >= 21) {
            jvmArgs '-XX:+ZGenerational'
        }
    }

    testLogging {
        events "passed", "skipped", "failed"
    }
}

// Spring Boot 애플리케이션 JVM 설정 (ZGC + GC 로그)
bootRun {
    jvmArgs = [
        '-Xmx2g',
        '-Xms2g',
        // '-Xlog:gc*:file=gc.log:time,uptime,level,tags:filecount=5,filesize=10m', // gc.log 파일 생성
        '-XX:+HeapDumpOnOutOfMemoryError'
    ]

    def javaMajor = JavaVersion.current().majorVersion.toInteger()
    if (javaMajor >= 15) {
        jvmArgs '-XX:+UseZGC'
    }
    if (javaMajor >= 21) {
        jvmArgs '-XX:+ZGenerational'
    }
}
